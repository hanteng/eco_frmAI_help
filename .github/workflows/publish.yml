name: Quarto Publish and Deploy

on:
  push:
    branches: [ main ] # Triggers the build automatically whenever you push to main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write # <--- CRITICAL: Permission to verify the runner
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Quarto CLI
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 3. Setup R environment
      - name: Setup R
      - name: Set up R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # ⚡️ CRITICAL SPEED FIX: Instantly downloads pre-compiled Ubuntu binaries instead of compiling from source

      # 4. Install R dependencies
      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::babelquarto
          packages: |
            github::ropensci-review-tools/babelquarto
      # 5. Render Multilingual Book using babelquarto
      - name: Render Multilingual Book
        env:
          BABELQUARTO_CI_URL: "https://eco.frmai.help" # 👈 Update with your site URL
        run: |
          Rscript -e 'babelquarto::render_book()'

      # 6. Upload Pages Artifact
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_book'

      # 8. Deploy Artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4