project:
  type: book
  resources:
    - CNAME               # Added to ensure your domain file is kept during rendering

book:
  title: "Orchestrating AI-SDG EcoInnovations"
  subtitle: "A Playbook for Mapping and Designing an Open and Collaborative Future"
  cover-image: images/cover.png
  cover-image-alt: "Book cover showing the Illustrations of Alice and the Dodo from Alice's Adventures in Wonderland, by John Tenniel (1865)"  
  author:
    - name: "Han-Teng Liao"
      orcid: "0000-0000-0000-0000"   # replace with actual ORCID
      affiliations:
        - name: "Independent Researcher"
  date: "2026-07-23"   # ISO format so it parses/localizes correctly across formats
  site-url: "https://eco.frmai.help"   # matches CNAME; update if the domain changes
  sidebar:
    style: docked
    collapse-level: 1
  search: true
  page-navigation: true
  reader-mode: true

  # ---- Structure: 3 parts x 3 chapters, mirroring the 9-block canvas 1:1 ----
  chapters:
    - index.qmd
    - part: "Part I: Data Engine (Scientometrics & Patent Data and Visualization)"
      chapters:
        - 01-scientometric-horizon.qmd
        - 02-ai-nlp-extraction.qmd
        - 03-sdg-target-mapping.qmd
    - part: "Part II: The Translation Bridge (Extended ITU Toolkits Design Canvas)"
      chapters:
        - 04-itu-ecoinnovation-canvas.qmd
        - 05-service-design-meta-journeys.qmd
        - 06-ssbd-derisking-matrix.qmd
    - part: "Part III: Industrial & Policy Outputs (Standards & RegTech)"
      chapters:
        - 07-digital-product-passports.qmd
        - 08-industrial-data-spaces.qmd
        - 09-regtech-defa-alignment.qmd
    - references.qmd

  # Appendices are a distinct top-level key, not a "fake part" inside chapters.
  # RE-ENABLED: these were commented out, which orphaned every @sec-app-canvas
  # and @sec-app-mermaid cross-reference in Chapters 1, 2, 4, 5, 9, and the Preface.
  appendices:
    - appendix-a-canvas-spec.qmd
    - appendix-b-mermaid-workflows.qmd

bibliography: references.bib
csl: https://www.zotero.org/styles/springer-basic-author-date

crossref:
  chapters: true
  appendix-title: "Appendix"
  appendix-delim: ":"

number-depth: 2        # number sections to x.y; leave x.y.z unnumbered
number-sections: true

execute:
  freeze: auto  # re-run only chapters whose source changed; `true` never re-runs at all
  echo: false

format:
  html:
    theme:
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss]
    toc: true
    toc-depth: 3
    code-fold: show
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    footnotes-hover: true

  # RESTORED: this whole block, plus templates/springer-header.tex, was missing from
  # the upload, meaning no PDF target existed at all. Confirm whether that was
  # intentional (website-first) -- restoring it costs nothing since it's additive
  # to the HTML build, but delete this block again if PDF isn't wanted right now.
  pdf:
    documentclass: scrbook     # KOMA-Script stand-in for drafting/review;
                                # swap to Springer's own class (e.g. svmono)
                                # only once a contract/template is issued
    papersize: a4
    classoption: [10pt, openright, twoside]
    toc: true
    toc-depth: 3
    colorlinks: true
    linkcolor: blue
    citecolor: darkgreen
    urlcolor: blue
    include-in-header: templates/springer-header.tex
    pdf-engine: xelatex
    keep-tex: true

babelquarto:
  languagecodes:
    - name: ja
      text: "日本語"
    - name: "zh-hant"       # Use this exact text handle
      text: "繁體中文"
    - name: "zh-hans"       # Use this exact text handle
      text: "简体中文"
    - name: en
      text: "English"
  mainlanguage: 'en'
  languages: ['ja', 'zh-hant', 'zh-hans']

  # Metadata Mapping Variables
  title-ja: "エコイノベーションのためのAI"
  title-zh-hant: "人工智慧促進生態創新"
  title-zh-hans: "人工智能促进生态创新"
  author-ja: "廖漢騰"
  author-zh-hant: "廖漢騰"
  author-zh-hans: "廖汉腾"
  lang: en

# NOTE: babelquarto config keys above are correct for the {babelquarto} R package,
# but this is currently inert: it needs (1) the babelquarto R package installed and
# rendered via its own render_book()/render_website(), not plain `quarto render`,
# and (2) a translated file per chapter per language, e.g.
# 01-scientometric-horizon.ja.qmd -- none of which exist yet. The "Welcome" text's
# promised globe-icon language switcher will not appear until both are in place.
