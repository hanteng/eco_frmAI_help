project:
  type: book
  resources:
    - CNAME               # Added to ensure your domain file is kept during rendering

execute:
  freeze: true  # 👈 This tells Quarto to only execute your code chunks when you explicitly change a file.

book:
  title: "AI for Eco-Innovations"
  author: "Han-Teng Liao"
  date: "23/07/2026"
  chapters:
    - index.qmd
    - intro.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      - cosmo
      - brand
  #pdf:
  #  documentclass: scrreprt

babelquarto:
  languagecodes:
    - name: ja
      text: "日本語"
    - name: "zh-hant"       # Use this exact text handle
      text: "繁體中文"
    - name: "zh-hans"       # Use this exact text handle
      text: "简体中文"
    - name: en
      text: "English"
  mainlanguage: 'en'
  languages: ['ja', 'zh-hant', 'zh-hans']

  # Metadata Mapping Variables
  title-ja: "エコイノベーションのためのAI"
  title-zh-hant: "人工智慧促進生態創新"
  title-zh-hans: "人工智能促进生态创新"
  author-ja: "廖漢騰"
  author-zh-hant: "廖漢騰"
  author-zh-hans: "廖汉腾"
  lang: en

