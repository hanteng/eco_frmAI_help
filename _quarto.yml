project:
  type: book
  resources:
    - CNAME               # Added to ensure your domain file is kept during rendering

book:
  title: "Orchestrating AI-SDG EcoInnovations"
  subtitle: "A Playbook for Mapping and Designing an Open and Collaborative Future"
  author:
    - name: "Han-Teng Liao"
      orcid: "0000-0000-0000-0000"   # replace with actual ORCID
      affiliations:
        - name: "Independent Researcher"
  date: "23/07/2026"
  # ---- Structure: 3 parts x 3 chapters, mirroring the 9-block canvas 1:1 ----
  chapters:
    - index.qmd
    - part: "Part I: Data Engine (Scientometrics & Patent Data and Visualization)"
      chapters:
        - 01-scientometric-horizon.qmd
        - 02-ai-nlp-extraction.qmd
        - 03-sdg-target-mapping.qmd
    - part: "Part II: The Translation Bridge (Extended ITU Toolkits Design Canvas)"
      chapters:
        - 04-itu-ecoinnovation-canvas.qmd
        - 05-service-design-meta-journeys.qmd
        - 06-ssbd-derisking-matrix.qmd
    - part: "Part III: Industrial & Policy Outputs (Standards & RegTech)"
      chapters:
        - 07-digital-product-passports.qmd
        - 08-industrial-data-spaces.qmd
        - 09-regtech-defa-alignment.qmd
    - references.qmd

  # Appendices are a distinct top-level key, not a "fake part" inside chapters.
  # This is the current Quarto convention and renders with correct
  # A/B numbering and its own TOC/nav treatment in both HTML and PDF/LaTeX.
  appendices:
    - appendix-a-canvas-spec.qmd
    - appendix-b-mermaid-workflows.qmd

bibliography: references.bib
csl: https://www.zotero.org/styles/springer-basic-author-date

crossref:
  chapters: true
  appendix-title: "Appendix"
  appendix-delim: ":"

number-depth: 2        # number sections to x.y; leave x.y.z unnumbered
number-sections: true

execute:
  freeze: true  # 👈 This tells Quarto to only execute your code chunks when you explicitly change a file.
  #freeze: auto  # cache/reuse output; only re-run changed chapters
  echo: false


format:
  html:
    theme:
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss]
    toc: true
    toc-depth: 3
    code-fold: show
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    footnotes-hover: true

babelquarto:
  languagecodes:
    - name: ja
      text: "日本語"
    - name: "zh-hant"       # Use this exact text handle
      text: "繁體中文"
    - name: "zh-hans"       # Use this exact text handle
      text: "简体中文"
    - name: en
      text: "English"
  mainlanguage: 'en'
  languages: ['ja', 'zh-hant', 'zh-hans']

  # Metadata Mapping Variables
  title-ja: "エコイノベーションのためのAI"
  title-zh-hant: "人工智慧促進生態創新"
  title-zh-hans: "人工智能促进生态创新"
  author-ja: "廖漢騰"
  author-zh-hant: "廖漢騰"
  author-zh-hans: "廖汉腾"
  lang: en

